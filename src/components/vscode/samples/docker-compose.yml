# portfolio-infra — 다계열사 시스템을 컨테이너로 격리 운영하는 구성
#
# 원칙: 서브넷·포트·볼륨은 기본값에 맡기지 않는다.
# (기본 대역이 호스트 네트워크와 충돌해 서버가 통째로 멈춘 날 이후의 규칙)

networks:
  portfolio-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16   # 호스트 대역(10.x, 192.168.x)과 겹치지 않게 명시

volumes:
  pg-data:
  minio-data:
  neo4j-data:

services:
  qfieldcloud-app:            # 현장 GPS 수집 서버 (공식 레포 클론 후 직접 셋팅)
    image: opengisch/qfieldcloud:latest
    ports:
      - "8011:8000"           # 좌측: 호스트 / 우측: 컨테이너 — 항상 명시
    depends_on:
      postgis:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    networks: [portfolio-net]
    restart: unless-stopped

  qfieldcloud-worker:         # 수집 데이터 패키징·델타 적용 비동기 워커
    image: opengisch/qfieldcloud-worker
    depends_on: [qfieldcloud-app]
    networks: [portfolio-net]
    restart: unless-stopped

  postgis:                    # 공간 DB — gps_point 저장 → 정제 트리거 → 라우팅 그래프
    image: postgis/postgis:15-3.4
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5
    networks: [portfolio-net]
    restart: unless-stopped

  minio:                      # S3 호환 스토리지 — 수집 파일 보관
    image: minio/minio
    command: server /data
    ports:
      - "9000:9000"
    volumes:
      - minio-data:/data
    networks: [portfolio-net]
    restart: unless-stopped

  redis:                      # 캐시 + 잡 큐
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks: [portfolio-net]
    restart: unless-stopped

  neo4j:                      # 온톨로지 그래프 DB — 챗봇 할루시네이션 제거의 핵심
    image: neo4j:5.26
    ports:
      - "7474:7474"           # HTTP (Neo4j Browser)
      - "7687:7687"           # Bolt
    volumes:
      - neo4j-data:/data
    networks: [portfolio-net]
    restart: unless-stopped

  qdrant:                     # 벡터 DB — 10만 문서 RAG 검색
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    networks: [portfolio-net]
    restart: unless-stopped

  n8n:                        # 업무 자동화 엔진 — 시황 리포트 파이프라인
    image: n8nio/n8n
    ports:
      - "5678:5678"
    networks: [portfolio-net]
    restart: unless-stopped
